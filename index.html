// ---- LOGIN ----
function LoginScreen({ users, onLogin, onBack }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const submit = () => {
    const u = users.find((x) => x.username.toLowerCase() === username.trim().toLowerCase() && x.password === password);
    if (!u) { setError('Usuário ou senha incorretos.'); return; }
    setError('');
    onLogin(u);
  };

  return (
    <div className="min-h-screen bg-[#1c1b1f] flex items-center justify-center p-5">
      <div className="w-full max-w-sm">
        <button onClick={onBack} className="text-[#c9c4b8] text-sm flex items-center gap-1 mb-6 hover:text-white">
          <Icon name="ArrowLeft" size={14} /> Voltar
        </button>
        <div className="bg-[#FAF8F3] rounded-2xl p-8">
          <p className="text-[11px] uppercase tracking-[0.2em] text-[#B99257] font-semibold mb-2">Acesso restrito</p>
          <h1 className="font-['Fraunces'] text-2xl mb-6 text-[#1c1b1f]">Área do cliente</h1>
          <div>
            <Field label="Usuário">
              <input 
                className={inputCls} 
                value={username} 
                onChange={(e) => setUsername(e.target.value)} 
                onKeyDown={(e) => e.key === 'Enter' && submit()} 
                autoFocus 
                placeholder="Ex: gabriela"
              />
            </Field>
            <Field label="Senha">
              <input 
                type="password" 
                className={inputCls} 
                value={password} 
                onChange={(e) => setPassword(e.target.value)} 
                onKeyDown={(e) => e.key === 'Enter' && submit()}
                placeholder="••••••••" 
              />
            </Field>
            {error && <p className="text-[#a13a3a] text-sm mb-3">{error}</p>}
            <Btn onClick={submit} className="w-full mt-4">Entrar</Btn>
          </div>
          <p className="text-xs text-[#8a8378] mt-4">Demo: gabriela / admin123</p>
        </div>
      </div>
    </div>
  );
}
