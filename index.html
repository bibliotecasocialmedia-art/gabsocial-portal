/* ---------------------------------------------------------------------- */
/* Storage helpers (Firestore)                                            */
/* ---------------------------------------------------------------------- */
async function loadKey(key, fallback) {
  try {
    const doc = await db.collection('gabsocial').doc(key).get();
    if (doc.exists) return JSON.parse(doc.data().value);
    await db.collection('gabsocial').doc(key).set({ value: JSON.stringify(fallback) });
    return fallback;
  } catch (e) {
    console.error('Erro ao carregar', key, e);
    return fallback;
  }
}
async function saveKey(key, value) {
  try {
    await db.collection('gabsocial').doc(key).set({ value: JSON.stringify(value) });
  } catch (e) {
    console.error('Erro ao salvar', key, e);
  }
}

function LoginScreen({ users, onLogin, onBack }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const submit = () => {
    const u = users.find((x) => x.username.toLowerCase() === username.trim().toLowerCase() && x.password === password);
    if (!u) { setError('Usuário ou senha incorretos.'); return; }
    setError('');
    onLogin(u);
  };

  return (
    <div className="min-h-screen bg-[#1c1b1f] flex items-center justify-center p-5">
      <div className="w-full max-w-sm">
        <button onClick={onBack} className="text-[#c9c4b8] text-sm flex items-center gap-1 mb-6 hover:text-white">
          <Icon name="ArrowLeft" size={14} /> Voltar ao site
        </button>
        <div className="bg-[#FAF8F3] rounded-2xl p-8">
          <p className="text-[11px] uppercase tracking-[0.2em] text-[#B99257] font-semibold mb-2">Acesso restrito</p>
          <h1 className="font-['Fraunces'] text-2xl mb-6 text-[#1c1b1f]">Entrar na área do cliente</h1>
          <div>
            <Field label="Usuário">
              <input className={inputCls} value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submit()} autoFocus />
            </Field>
            <Field label="Senha">
              <input type="password" className={inputCls} value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submit()} />
            </Field>
            {error && <p className="text-[#a13a3a] text-sm mb-3">{error}</p>}
            <Btn onClick={submit} className="w-full mt-2">Entrar <Icon name="ChevronRight" size={15} /></Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

        <Field label="Data sugerida"><input className={inputCls} value={form.data} onChange={(e) => set('data', e.target.value)} placeholder="ex: 08/07/2026" /></Field>
        <Field label="Horário de postagem"><input className={inputCls} value={form.horario} onChange={(e) => set('horario', e.target.value)} placeholder="ex: 18h30" /></Field>
      </div>
      {POST_FIELDS.map(([key, label]) => (
        <Field key={key} label={label}>
          {['corpo', 'legenda', 'textoApoio'].includes(key) ? (
            <textarea className={inputCls} rows={3} value={form[key]} onChange={(e) => set(key, e.target.value)} />
          ) : (
            <input className={inputCls} value={form[key]} onChange={(e) => set(key, e.target.value)} />
          )}
        </Field>
      ))}
      <div className="flex gap-2 justify-end mt-4">
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={() => onSave({ ...form, id: form.id || uid('post') })}><Icon name="Save" size={14} /> Salvar</Btn>
      </div>
    </Modal>
  );
}

function FileForm({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial || { nome: '', url: '', tipo: 'Drive', notas: '' });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  return (
    <Modal title={initial ? 'Editar arquivo' : 'Novo arquivo/link'} onClose={onClose}>
      <Field label="Nome"><input className={inputCls} value={form.nome} onChange={(e) => set('nome', e.target.value)} /></Field>
      <Field label="Link (Google Drive, contrato, etc.)"><input className={inputCls} value={form.url} onChange={(e) => set('url', e.target.value)} placeholder="https://..." /></Field>

        <select className={inputCls} value={form.tipo} onChange={(e) => set('tipo', e.target.value)}>

        </select>
      </Field>
      <Field label="Notas"><textarea className={inputCls} rows={2} value={form.notas} onChange={(e) => set('notas', e.target.value)} /></Field>
      <div className="flex gap-2 justify-end mt-4">
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={() => onSave({ ...form, id: form.id || uid('file') })}><Icon name="Save" size={14} /> Salvar</Btn>
      </div>
    </Modal>
  );
}

/* ---------------------------------------------------------------------- */
/* Client Portal                                                          */
/* ---------------------------------------------------------------------- */
function ClientPortal({ client, calendar, files, onLogout }) {
  const [tab, setTab] = useState('calendario');
  const tabs = [['calendario', 'Calendário editorial', 'Calendar'], ['contrato', 'Contrato & valores', 'FileText'], ['arquivos', 'Arquivos', 'FolderOpen']];

  return (
    <div className="min-h-screen bg-[#FAF8F3]">
      <header className="bg-[#1c1b1f] text-white">
        <div className="max-w-5xl mx-auto px-5 md:px-8 h-16 flex items-center justify-between">
          <div>
            <p className="text-[11px] uppercase tracking-[0.2em] text-[#B99257]">Área do cliente</p>
            <p className="font-['Fraunces'] text-lg">{client?.name}</p>

          <Btn variant="ghost" onClick={onLogout} className="text-white hover:bg-white/10"><Icon name="LogOut" size={15} /> Sair</Btn>
        </div>
      </header>

      <div className="max-w-5xl mx-auto px-5 md:px-8">
        <div className="flex gap-1 border-b border-[#e4ded2] mt-6 mb-8 overflow-x-auto">
          {tabs.map(([key, label, iconName]) => (
            <button key={key} onClick={() => setTab(key)} className={`flex items-center gap-1.5 px-4 py-3 text-sm whitespace-nowrap border-b-2 transition-colors ${tab === key ? 'border-[#6E2A3B] text-[#6E2A3B] font-medium' : 'border-transparent text-[#8a8378] hover:text-[#1c1b1f]'}`}>

              {[['Plano', client.plano], ['Créditos/mês', client.creditos], ['Valor', `R$ ${client.valor}`], ['Vencimento', client.vencimento], ['Observações', client.obs || '—']].map(([l, v]) => (

/* ---------------------------------------------------------------------- */
/* Admin Panel                                                            */
/* ---------------------------------------------------------------------- */
function AdminPanel({ clients, setClients, users, setUsers, allCalendar, setAllCalendar, allFiles, setAllFiles, onLogout }) {
  const [selectedClientId, setSelectedClientId] = useState(clients[0]?.id || null);
  const [tab, setTab] = useState('calendario');
  const [showClientForm, setShowClientForm] = useState(false);
  const [editingClient, setEditingClient] = useState(null);
  const [showPostForm, setShowPostForm] = useState(false);
  const [editingPost, setEditingPost] = useState(null);
  const [showFileForm, setShowFileForm] = useState(false);
  const [editingFile, setEditingFile] = useState(null);

  const client = clients.find((c) => c.id === selectedClientId);
  const calendar = allCalendar[selectedClientId] || [];
  const files = allFiles[selectedClientId] || [];
  const clientUser = users.find((u) => u.clientId === selectedClientId);

  const saveClient = async (data) => {
    let updated, isNew = false;
    if (clients.find((c) => c.id === data.id)) {
      updated = clients.map((c) => (c.id === data.id ? data : c));
    } else {
      isNew = true;
      updated = [...clients, data];
    }
    setClients(updated);
    await saveKey('clients', updated);

    if (isNew) {
      const newUser = { id: uid('u'), username: data.loginUsername, password: data.loginPassword, role: 'client', clientId: data.id };
      const updatedUsers = [...users, newUser];
      setUsers(updatedUsers);
      await saveKey('users', updatedUsers);
    } else if (clientUser) {
      const updatedUsers = users.map((u) => u.id === clientUser.id ? { ...u, username: data.loginUsername || u.username, password: data.loginPassword || u.password } : u);
      setUsers(updatedUsers);
      await saveKey('users', updatedUsers);
    }
    setShowClientForm(false);
    setEditingClient(null);
    if (isNew) setSelectedClientId(data.id);
  };

  const deleteClient = async (id) => {
    if (!confirm('Remover este cliente e todos os dados associados? Essa ação não pode ser desfeita.')) return;
    const updated = clients.filter((c) => c.id !== id);
    setClients(updated); await saveKey('clients', updated);
    const updatedUsers = users.filter((u) => u.clientId !== id);
    setUsers(updatedUsers); await saveKey('users', updatedUsers);
    const updatedCal = { ...allCalendar }; delete updatedCal[id];
    setAllCalendar(updatedCal); await saveKey('calendar', updatedCal);
    const updatedFiles = { ...allFiles }; delete updatedFiles[id];
    setAllFiles(updatedFiles); await saveKey('files', updatedFiles);
    if (selectedClientId === id) setSelectedClientId(updated[0]?.id || null);
  };

  const savePost = async (post) => {
    const list = allCalendar[selectedClientId] || [];
    const exists = list.find((p) => p.id === post.id);
    const updatedList = exists ? list.map((p) => (p.id === post.id ? post : p)) : [...list, post];
    const updated = { ...allCalendar, [selectedClientId]: updatedList };
    setAllCalendar(updated); await saveKey('calendar', updated);
    setShowPostForm(false); setEditingPost(null);
  };

  const deletePost = async (postId) => {
    const list = (allCalendar[selectedClientId] || []).filter((p) => p.id !== postId);
    const updated = { ...allCalendar, [selectedClientId]: list };
    setAllCalendar(updated); await saveKey('calendar', updated);
  };

  const saveFile = async (file) => {
    const list = allFiles[selectedClientId] || [];
    const exists = list.find((f) => f.id === file.id);
    const updatedList = exists ? list.map((f) => (f.id === file.id ? file : f)) : [...list, file];
    const updated = { ...allFiles, [selectedClientId]: updatedList };
    setAllFiles(updated); await saveKey('files', updated);
    setShowFileForm(false); setEditingFile(null);
  };

  const deleteFile = async (fileId) => {
    const list = (allFiles[selectedClientId] || []).filter((f) => f.id !== fileId);
    const updated = { ...allFiles, [selectedClientId]: list };
    setAllFiles(updated); await saveKey('files', updated);
  };

  const tabs = [['calendario', 'Calendário', 'Calendar'], ['contrato', 'Contrato & valores', 'FileText'], ['arquivos', 'Arquivos', 'FolderOpen']];

  return (
    <div className="min-h-screen bg-[#FAF8F3] flex flex-col md:flex-row">
      <aside className="w-full md:w-72 bg-[#1c1b1f] text-white flex-shrink-0">
        <div className="p-5 flex items-center justify-between border-b border-white/10">
          <div className="flex items-center gap-2">
            <Icon name="Shield" size={16} className="text-[#B99257]" />
            <span className="font-['Fraunces'] text-lg">Painel Admin</span>
          </div>
          <Btn variant="ghost" onClick={onLogout} className="text-white hover:bg-white/10 !px-2"><Icon name="LogOut" size={15} /></Btn>
        </div>
        <div className="p-4">
          <div className="flex items-center justify-between mb-2">
            <p className="text-[11px] uppercase tracking-wide text-[#c9c4b8]">Clientes</p>
            <button onClick={() => { setEditingClient(null); setShowClientForm(true); }} className="text-[#B99257] hover:text-white"><Icon name="Plus" size={16} /></button>
          </div>
          <div className="space-y-1">
            {clients.map((c) => (
              <button key={c.id} onClick={() => setSelectedClientId(c.id)} className={`w-full text-left px-3 py-2.5 rounded-lg text-sm transition-colors ${selectedClientId === c.id ? 'bg-[#6E2A3B] text-white' : 'text-[#c9c4b8] hover:bg-white/5'}`}>
                {c.name}
              </button>
            ))}
          </div>
        </div>
      </aside>

      <main className="flex-1 min-w-0">
        {client ? (
          <div className="max-w-4xl mx-auto px-5 md:px-8 py-8">
            <div className="flex items-start justify-between mb-6 gap-4">
              <div>
                <p className="text-[11px] uppercase tracking-wide text-[#B99257] font-semibold">{client.niche}</p>
                <h1 className="font-['Fraunces'] text-2xl">{client.name}</h1>
                {clientUser && <p className="text-xs text-[#8a8378] mt-1">Login: <span className="font-mono">{clientUser.username}</span></p>}
              </div>
              <div className="flex gap-2 flex-shrink-0">
                <Btn variant="outline" onClick={() => { setEditingClient(client); setShowClientForm(true); }}><Icon name="Edit2" size={13} /> Editar</Btn>
                <Btn variant="danger" onClick={() => deleteClient(client.id)}><Icon name="Trash2" size={13} /></Btn>
              </div>
            </div>

            <div className="flex gap-1 border-b border-[#e4ded2] mb-6 overflow-x-auto">
              {tabs.map(([key, label, iconName]) => (
                <button key={key} onClick={() => setTab(key)} className={`flex items-center gap-1.5 px-4 py-3 text-sm whitespace-nowrap border-b-2 ${tab === key ? 'border-[#6E2A3B] text-[#6E2A3B] font-medium' : 'border-transparent text-[#8a8378] hover:text-[#1c1b1f]'}`}>
                  <Icon name={iconName} size={15} /> {label}
                </button>
              ))}
            </div>

            {tab === 'calendario' && (
              <div>
                <Btn onClick={() => { setEditingPost(null); setShowPostForm(true); }} className="mb-4"><Icon name="Plus" size={14} /> Novo conteúdo</Btn>
                <div className="space-y-3">
                  {calendar.length === 0 && <EmptyState text="Nenhum conteúdo cadastrado ainda para este cliente." />}
                  {calendar.map((p) => <PostCard key={p.id} post={p} editable onEdit={(post) => { setEditingPost(post); setShowPostForm(true); }} onDelete={deletePost} />)}
                </div>
              </div>
            )}

            {tab === 'contrato' && (
              <div className="bg-white border border-[#e4ded2] rounded-xl p-6 max-w-lg">
                <h3 className="font-['Fraunces'] text-lg mb-4">Resumo do plano</h3>
                {[['Plano', client.plano], ['Créditos/mês', client.creditos], ['Valor', `R$ ${client.valor}`], ['Vencimento', client.vencimento], ['Observações', client.obs || '—']].map(([l, v]) => (
                  <div key={l} className="flex justify-between py-2.5 border-b border-[#f0ebe0] last:border-0 text-sm gap-4">
                    <span className="text-[#8a8378]">{l}</span>
                    <span className="text-right font-medium">{v}</span>
                  </div>
                ))}
                <Btn variant="outline" className="mt-4" onClick={() => { setEditingClient(client); setShowClientForm(true); }}><Icon name="Edit2" size={13} /> Editar plano</Btn>
              </div>
            )}

            {tab === 'arquivos' && (
              <div>
                <Btn onClick={() => { setEditingFile(null); setShowFileForm(true); }} className="mb-4"><Icon name="Plus" size={14} /> Novo arquivo/link</Btn>
                <div className="space-y-3">
                  {files.length === 0 && <EmptyState text="Nenhum arquivo cadastrado ainda." />}
                  {files.map((f) => (
                    <div key={f.id} className="flex items-center justify-between bg-white border border-[#e4ded2] rounded-xl px-5 py-4">
                      <div className="flex items-center gap-3 min-w-0">
                        <Icon name="Link" size={16} className="text-[#B99257] flex-shrink-0" />
                        <div className="min-w-0">
                          <p className="text-sm font-medium truncate">{f.nome}</p>
                          <p className="text-xs text-[#8a8378] truncate">{f.tipo}{f.notas ? ` · ${f.notas}` : ''}</p>
                        </div>
                      </div>
                      <div className="flex gap-1 flex-shrink-0">
                        <button onClick={() => { setEditingFile(f); setShowFileForm(true); }} className="text-[#8a8378] hover:text-[#1c1b1f] p-1.5"><Icon name="Edit2" size={14} /></button>
                        <button onClick={() => deleteFile(f.id)} className="text-[#8a8378] hover:text-[#a13a3a] p-1.5"><Icon name="Trash2" size={14} /></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        ) : (
          <div className="p-10"><EmptyState text="Nenhum cliente cadastrado. Adicione o primeiro no menu lateral." /></div>
        )}
      </main>

      {showClientForm && <ClientForm initial={editingClient} onClose={() => { setShowClientForm(false); setEditingClient(null); }} onSave={saveClient} />}
      {showPostForm && <PostForm initial={editingPost} onClose={() => { setShowPostForm(false); setEditingPost(null); }} onSave={savePost} />}
      {showFileForm && <FileForm initial={editingFile} onClose={() => { setShowFileForm(false); setEditingFile(null); }} onSave={saveFile} />}
    </div>
  );
}

function ClientForm({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial ? { ...initial, loginUsername: '', loginPassword: '' } : {
    id: uid('c'), name: '', niche: '', plano: '', creditos: '', valor: '', vencimento: '', obs: '', loginUsername: '', loginPassword: '',
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const isNew = !initial;

  return (
    <Modal title={isNew ? 'Novo cliente' : 'Editar cliente'} onClose={onClose} wide>
      <div className="grid sm:grid-cols-2 gap-x-4">
        <Field label="Nome do cliente"><input className={inputCls} value={form.name} onChange={(e) => set('name', e.target.value)} /></Field>
        <Field label="Nicho"><input className={inputCls} value={form.niche} onChange={(e) => set('niche', e.target.value)} /></Field>
      </div>
      <div className="grid sm:grid-cols-3 gap-x-4">
        <Field label="Plano"><input className={inputCls} value={form.plano} onChange={(e) => set('plano', e.target.value)} /></Field>
        <Field label="Créditos/mês"><input className={inputCls} value={form.creditos} onChange={(e) => set('creditos', e.target.value)} /></Field>
        <Field label="Valor (R$)"><input className={inputCls} value={form.valor} onChange={(e) => set('valor', e.target.value)} /></Field>
      </div>
      <Field label="Vencimento"><input className={inputCls} value={form.vencimento} onChange={(e) => set('vencimento', e.target.value)} /></Field>
      <Field label="Observações do contrato"><textarea className={inputCls} rows={2} value={form.obs} onChange={(e) => set('obs', e.target.value)} /></Field>

      <div className="mt-4 pt-4 border-t border-[#e4ded2]">
        <p className="text-[11px] uppercase tracking-wide text-[#B99257] font-semibold mb-3">{isNew ? 'Login de acesso' : 'Alterar login (deixe em branco para manter)'}</p>
        <div className="grid sm:grid-cols-2 gap-x-4">
          <Field label="Usuário"><input className={inputCls} value={form.loginUsername} onChange={(e) => set('loginUsername', e.target.value)} /></Field>
          <Field label="Senha"><input className={inputCls} value={form.loginPassword} onChange={(e) => set('loginPassword', e.target.value)} /></Field>
        </div>
      </div>

      <div className="flex gap-2 justify-end mt-4">
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={() => onSave(form)}><Icon name="Save" size={14} /> Salvar</Btn>
      </div>
    </Modal>
  );
}

/* ---------------------------------------------------------------------- */
/* App root                                                               */
/* ---------------------------------------------------------------------- */
function App() {
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('site');
  const [session, setSession] = useState(null);

  const [users, setUsers] = useState([]);
  const [clients, setClients] = useState([]);
  const [site, setSite] = useState(DEFAULT_SITE);
  const [allCalendar, setAllCalendar] = useState({});
  const [allFiles, setAllFiles] = useState({});

  useEffect(() => {
    (async () => {
      const [u, c, s, cal, fl] = await Promise.all([
        loadKey('users', DEFAULT_USERS),
        loadKey('clients', DEFAULT_CLIENTS),
        loadKey('site-content', DEFAULT_SITE),
        loadKey('calendar', {}),
        loadKey('files', {}),
      ]);
      setUsers(u); setClients(c); setSite(s); setAllCalendar(cal); setAllFiles(fl);
      setLoading(false);
    })();
  }, []);

  const handleLogin = (user) => { setSession(user); setView('portal'); };
  const handleLogout = () => { setSession(null); setView('site'); };

  if (loading) {
    return <div className="min-h-screen bg-[#FAF8F3] flex items-center justify-center"><p className="text-sm text-[#8a8378]">Carregando…</p></div>;
  }

  if (view === 'login') return <LoginScreen users={users} onLogin={handleLogin} onBack={() => setView('site')} />;

  if (view === 'portal' && session) {
    if (session.role === 'admin') {
      return <AdminPanel clients={clients} setClients={setClients} users={users} setUsers={setUsers} allCalendar={allCalendar} setAllCalendar={setAllCalendar} allFiles={allFiles} setAllFiles={setAllFiles} onLogout={handleLogout} />;
    }
    const client = clients.find((c) => c.id === session.clientId);
    return <ClientPortal client={client} calendar={allCalendar[session.clientId] || []} files={allFiles[session.clientId] || []} onLogout={handleLogout} />;
  }

  return <PublicSite site={site} clients={clients} onGoLogin={() => setView('login')} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
